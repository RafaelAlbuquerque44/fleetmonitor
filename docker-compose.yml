version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fleetmonitor-db
    environment:
      POSTGRES_USER: fleetmonitor_user
      POSTGRES_PASSWORD: fleetmonitor_password
      POSTGRES_DB: fleetmonitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetmonitor-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fleetmonitor_user:fleetmonitor_password@db:5432/fleetmonitor
    depends_on:
      - db
    volumes:
      - ./backend:/app
    restart: unless-stopped
    command: >
      bash -c "python manage.py makemigrations core &&
               python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetmonitor-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
